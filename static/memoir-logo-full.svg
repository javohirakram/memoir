<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8956c"/>
      <stop offset="50%" style="stop-color:#e8c9a8"/>
      <stop offset="100%" style="stop-color:#c8956c"/>
    </linearGradient>
    <linearGradient id="gold-subtle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8956c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8c9a8;stop-opacity:0.6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:rgba(200,149,108,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(200,149,108,0)"/>
    </radialGradient>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300&amp;display=swap');
  </style>

  <!-- Background -->
  <rect width="800" height="800" fill="#0a0a0c"/>
  <!-- Glow behind icon -->
  <circle cx="400" cy="340" r="260" fill="url(#glow)"/>

  <!-- Rounded square icon frame -->
  <rect x="200" y="120" width="400" height="400" rx="88" fill="#141418" stroke="rgba(200,149,108,0.15)" stroke-width="1.5"/>

  <!-- M letterform -->
  <text x="400" y="420" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="280" fill="url(#gold)">M</text>

  <!-- Wordmark -->
  <text x="400" y="640" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="600" font-size="80" fill="url(#gold)" letter-spacing="4">Memoir</text>

  <!-- Tagline -->
  <text x="400" y="695" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="300" font-size="22" fill="#8a8680" letter-spacing="4">YOUR THOUGHTS, HANDLED</text>
</svg>