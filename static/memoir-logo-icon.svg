<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8956c"/>
      <stop offset="50%" style="stop-color:#e8c9a8"/>
      <stop offset="100%" style="stop-color:#c8956c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(200,149,108,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(200,149,108,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0c"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- M letterform -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
  </style>
  <text x="256" y="340" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="320" fill="url(#gold)">M</text>
</svg>